<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор аватарки с QR-кодом</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            font-family: Arial, sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 820px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 20px 15px;
        }
        h2 {
            font-size: clamp(20px, 3.5vw, 30px);
            text-align: center;
            margin-bottom: 0;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-end;
            gap: 10px;
            width: 100%;
            max-width: 780px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            flex: 2 1 220px;
            min-width: 160px;
        }
        .input-group label {
            font-size: 12px;
            color: #888;
            margin-bottom: 3px;
            padding-left: 4px;
        }
        .input-group input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            background: #2a2a4a;
            color: white;
            height: 42px;
        }
        .controls input[type="file"] {
            background: #2a2a4a;
            color: white;
            padding: 10px 14px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            flex: 3 1 280px;
            min-width: 220px;
            height: 42px;
        }
        .controls button {
            background: #00d4ff;
            color: #1a1a2e;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            flex: 1 1 140px;
            min-width: 120px;
            height: 42px;
            white-space: nowrap;
        }
        .controls button:hover {
            transform: scale(1.02);
            background: #00f5ff;
        }
        .slider-container {
            width: 100%;
            max-width: 350px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #aaa;
            font-size: 14px;
        }
        .slider-container input[type="range"] {
            flex: 1;
            accent-color: #00d4ff;
            cursor: pointer;
        }
        #sizeLabel {
            color: #00d4ff;
            font-weight: bold;
            min-width: 36px;
            text-align: center;
        }
        #output {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-top: 5px;
        }
        #qrCanvas {
            width: 100%;
            max-width: 500px;
            height: auto;
            aspect-ratio: 1 / 1;
            border-radius: 16px;
            border: 3px solid #00d4ff;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
            cursor: pointer;
            background: white;
            display: block;
        }
        #qrCanvas.waiting {
            cursor: not-allowed;
            opacity: 0.7;
        }
        #photoPreview {
            margin-top: 8px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #00d4ff;
            display: none;
        }
        #status {
            margin-top: 10px;
            color: #aaa;
            font-size: 14px;
            text-align: center;
            min-height: 22px;
        }
        #errorLog {
            margin-top: 6px;
            color: #ff6b6b;
            font-size: 13px;
            text-align: center;
            min-height: 18px;
        }
        @media (max-width: 650px) {
            body { padding: 10px; }
            .container { gap: 12px; padding: 10px; }
            .controls input,
            .controls button,
            .input-group input[type="text"] {
                font-size: 14px;
                height: 38px;
                padding: 8px 12px;
            }
            .controls input[type="file"] {
                height: 38px;
                padding: 8px 12px;
                min-width: 160px;
                flex: 2 1 180px;
            }
            .controls button {
                height: 38px;
                padding: 8px 16px;
                min-width: 100px;
            }
            #qrCanvas { max-width: 100%; border-width: 3px; }
        }
        @media (max-width: 480px) {
            .controls input[type="file"] {
                min-width: 120px;
                flex: 1 1 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>⚡ Создай QR-код со своей фотографией</h2>

        <div class="controls">
            <div class="input-group">
                <label for="githubLink">🔗 Ссылка на ваш профиль</label>
                <input type="text" id="githubLink" placeholder="https://ваш-сайт.ру" value="https://github.com/EvgenMironov900">
            </div>
            <input type="file" id="photoInput" accept="image/*">
            <button id="generateBtn">🚀 Сгенерировать</button>
        </div>

        <div class="slider-container">
            <span>🧩 Размер фото:</span>
            <input type="range" id="sizeSlider" min="15" max="35" value="18" step="0.5">
            <span id="sizeLabel">18%</span>
        </div>

        <div id="output">
            <canvas id="qrCanvas" width="1600" height="1600" class="waiting"></canvas>
            <img id="photoPreview" alt="Предпросмотр фото">
        </div>
        <div id="status">📸 Загрузи фото и нажми кнопку</div>
        <div id="errorLog"></div>
    </div>

    <script>
        // === ДАННЫЕ ===
        var userPhoto = null;
        var currentPhotoSize = 18;
        var isQRReady = false;

        // === ЭЛЕМЕНТЫ DOM ===
        var canvas = document.getElementById('qrCanvas');
        var ctx = canvas.getContext('2d');
        var statusEl = document.getElementById('status');
        var errorEl = document.getElementById('errorLog');
        var photoPreview = document.getElementById('photoPreview');
        var defaultUrl = document.getElementById('githubLink').value.trim();

        // === ФУНКЦИЯ ОБНОВЛЕНИЯ ИНТЕРФЕЙСА ===
        function setUIState(state, message) {
            statusEl.textContent = message;
            if (state === 'waiting') {
                canvas.classList.add('waiting');
                isQRReady = false;
            } else if (state === 'ready') {
                canvas.classList.remove('waiting');
                isQRReady = true;
            } else if (state === 'error') {
                canvas.classList.add('waiting');
                isQRReady = false;
            } else if (state === 'info') {
                canvas.classList.add('waiting');
                isQRReady = false;
            }
        }

        // === СЛАЙДЕР ===
        document.getElementById('sizeSlider').addEventListener('input', function() {
            currentPhotoSize = parseFloat(this.value);
            document.getElementById('sizeLabel').textContent = currentPhotoSize + '%';
        });

        // === ЗАГРУЗКА ФОТО ===
        document.getElementById('photoInput').addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(event) {
                var img = new Image();
                img.onload = function() {
                    userPhoto = img;
                    photoPreview.src = event.target.result;
                    photoPreview.style.display = 'block';
                    setUIState('info', '✅ Фото загружено! Нажми "Сгенерировать"');
                    errorEl.textContent = '';
                };
                img.onerror = function() {
                    errorEl.textContent = '❌ Не удалось загрузить фото';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // === ГЕНЕРАЦИЯ QR-КОДА ===
        function generateAvatar() {
            var size = 1600;
            canvas.width = size;
            canvas.height = size;

            var currentUrl = document.getElementById('githubLink').value.trim();

            if (!currentUrl || currentUrl === 'https://ваш-сайт.ру' || currentUrl === 'https://ваш-сайт.ру/') {
                errorEl.textContent = '⚠️ Введи корректную ссылку!';
                return;
            }

            if (currentUrl === defaultUrl) {
                var userConfirmed = confirm(
                    '❗ Вы используете пример ссылки. Вы уверены, что хотите создать QR-код с этой ссылкой?'
                    );
                if (!userConfirmed) {
                    setUIState('info', '⏸️ Генерация отменена. Укажите свою ссылку.');
                    errorEl.textContent = '';
                    return;
                }
            }

            setUIState('waiting', '⏳ Генерация QR-кода...');
            errorEl.textContent = '';

            var qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=1600x1600&data=' + encodeURIComponent(currentUrl) +
                '&bgcolor=ffffff&color=000000&margin=0&format=png';

            var qrImage = new Image();
            qrImage.crossOrigin = 'anonymous';

            qrImage.onload = function() {
                ctx.drawImage(qrImage, 0, 0, size, size);

                if (userPhoto) {
                    var centerX = size / 2;
                    var centerY = size / 2;
                    var photoSize = size * (currentPhotoSize / 100);
                    var radius = photoSize / 2;

                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius + 2, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.restore();

                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                    ctx.clip();

                    var imgAspect = userPhoto.width / userPhoto.height;
                    var drawW = photoSize;
                    var drawH = photoSize;
                    var offsetX = 0,
                        offsetY = 0;
                    if (imgAspect > 1) {
                        drawH = photoSize;
                        drawW = photoSize * imgAspect;
                        offsetX = (drawW - photoSize) / 2;
                    } else {
                        drawW = photoSize;
                        drawH = photoSize / imgAspect;
                        offsetY = (drawH - photoSize) / 2;
                    }
                    ctx.drawImage(userPhoto, centerX - drawW / 2 - offsetX, centerY - drawH / 2 - offsetY, drawW, drawH);
                    ctx.restore();

                    setUIState('ready', '✅ Готово! Кликни на QR код для скачивания.');
                    errorEl.textContent = '📐 Размер: 1600×1600, фото: ' + currentPhotoSize + '%';
                } else {
                    setUIState('info', '⚠️ QR-код сгенерирован, но фото не загружено.');
                    errorEl.textContent = '📸 Загрузи фото для аватарки.';
                }
            };

            qrImage.onerror = function() {
                errorEl.textContent = '❌ Ошибка загрузки QR-кода. Проверь интернет.';
                setUIState('error', '❌ Не удалось сгенерировать QR-код');
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, size, size);
                ctx.fillStyle = '#000000';
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('QR-код не загрузился', size / 2, size / 2);
            };

            qrImage.src = qrUrl;
        }

        // === КНОПКА ГЕНЕРАЦИИ ===
        document.getElementById('generateBtn').addEventListener('click', generateAvatar);

        // === КЛИК ПО ХОЛСТУ (скачивание) ===
        canvas.addEventListener('click', function() {
            if (!isQRReady) {
                setUIState('info', '⏳ Сначала загрузите фото и сгенерируйте QR-код!');
                errorEl.textContent = '';
                return;
            }
            try {
                var link = document.createElement('a');
                link.download = 'qr_avatar.png';
                link.href = this.toDataURL('image/png');
                link.click();
                setUIState('ready', '📥 Скачано!');
            } catch (e) {
                errorEl.textContent = '❌ Ошибка скачивания: ' + e.message;
            }
        });

        // === АВТОГЕНЕРАЦИЯ ПРИ ЗАГРУЗКЕ ===
        window.addEventListener('load', function() {
            setTimeout(function() {
                var size = 1600;
                canvas.width = size;
                canvas.height = size;
                var currentUrl = document.getElementById('githubLink').value.trim();

                if (!currentUrl || currentUrl === 'https://ваш-сайт.ру' || currentUrl === 'https://ваш-сайт.ру/') {
                    return;
                }

                var qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=1600x1600&data=' + encodeURIComponent(currentUrl) +
                    '&bgcolor=ffffff&color=000000&margin=0&format=png';

                var qrImage = new Image();
                qrImage.crossOrigin = 'anonymous';
                qrImage.onload = function() {
                    ctx.drawImage(qrImage, 0, 0, size, size);
                    setUIState('info', '📸 Загрузи фото и нажми кнопку');
                    errorEl.textContent = '';
                };
                qrImage.onerror = function() {
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, size, size);
                    ctx.fillStyle = '#000000';
                    ctx.font = '40px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('QR-код не загрузился', size / 2, size / 2);
                    setUIState('error', '❌ QR-код не загрузился');
                };
                qrImage.src = qrUrl;
            }, 500);
        });
    </script>
</body>
</html>
